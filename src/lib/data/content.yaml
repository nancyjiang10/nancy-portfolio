    image: /photos/trade.jpg
    imageAlt: An international trading port with containers and cranes
    description: Data-driven reporting on trade and tariffs.
    url: https://issuenumberone.journalism.cuny.edu/2026/02/23/us-goods-deficit-increased-trade-deficit-little-changed-despite-trump-tariffs/
    skills:
      - Accountability reporting
      - Government affairs
      - Advocacy
      - Photography
    body:
      The Bend was three acres of the foulest tenement block in the city — narrow alleys where the sun never reached, buildings that should have been condemned a generation earlier, and a death rate among the children many times higher than the city average.

      I wrote about it for years. I photographed it. I lectured on it. Reform is slow. The Bend went from a block I first reported on as a young man to a public park nearly twenty years later.
